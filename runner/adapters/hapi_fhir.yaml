# ENVIRONMENT ADAPTER — HAPI FHIR EHR. The ONLY layer that knows tool names / observation schema. It maps
# raw tool calls to canonical semantics and declares which SUBSTRATE this environment is and which reusable
# CLINICAL policy modules are in force. A second FHIR-like dataset adds its own adapter (different tool
# names) on the SAME substrate + clinical modules — zero core/substrate/policy change.
name: hapi_fhir
substrate: structured_record
clinical_modules: [medication_safety]

manifest:
  subject:
    type: patient
    binding: required        # every patient action must NAME its patient; "no target" != "active patient"
    id_context_keys: [patient_ref, patient_id, patient]      # structured context -> assigned subject
    from_args: [patient, subject, subject_ref, patient_ref, patient_id, subject_id]   # operated subject
  actions:
    # resource-specific reads first (they tag the evidence resource); then generic read; then writes.
    - match: {tool_pattern: allergy}
      semantic_type: read
      effect: none
      resource: AllergyIntolerance
      produces_evidence: {source_class: record, modality: record}
    - match: {tool_pattern: medication_request_search}
      semantic_type: read
      effect: none
      resource: MedicationRequest
      produces_evidence: {source_class: record, modality: record}
    - match: {tool_pattern: _search}
      semantic_type: read
      effect: none
      produces_evidence: {source_class: record, modality: record}
    - match: {tool_pattern: _read}
      semantic_type: read
      effect: none
      produces_evidence: {source_class: record, modality: record}
    - match: {tool: get_lab_reference_range}                # reference-range lookup: a read, no commit
      semantic_type: read
      effect: none
      produces_evidence: {source_class: record, modality: record}
    - match: {tool_pattern: medication_request_create}      # the high-risk commit (no evidence binding)
      semantic_type: create
      effect: irreversible
      resource: MedicationRequest
    - match: {tool_pattern: _create}
      semantic_type: create
      effect: irreversible
    - match: {tool: write_file}      # generic scratchpad write — NOT a patient operation
      semantic_type: update
      effect: reversible
      subject_binding: none
