# ENVIRONMENT ADAPTER — HAPI FHIR EHR. The ONLY layer that knows tool names / observation schema. It maps
# raw tool calls to canonical semantics and declares which SUBSTRATE this environment is and which reusable
# CLINICAL policy modules are in force. A second FHIR-like dataset adds its own adapter (different tool
# names) on the SAME substrate + clinical modules — zero core/substrate/policy change.
name: hapi_fhir
substrate: structured_record
clinical_modules: [medication_safety]

manifest:
  # repair_targets (item 3): the proposed FHIR payload paths (harness root {candidate, state}). Standard
  # FHIR resource structure -- adapter schema, not gold.
  repair_targets:
    - match: {field_keywords: [subject, patient]}
      writable_paths: [candidate.args.resource.subject.reference, candidate.args.subject]
      verification: {type: path_present}
    - match: {field_keywords: [dose, dosage, doseandrate]}
      writable_paths: ["candidate.args.resource.dosageInstruction[0].doseAndRate", candidate.args.dose]
      verification: {type: path_present}
    - match: {field_keywords: [route]}
      writable_paths: ["candidate.args.resource.dosageInstruction[0].route", candidate.args.route]
    - match: {field_keywords: [frequency, timing]}
      writable_paths: ["candidate.args.resource.dosageInstruction[0].timing", candidate.args.frequency]
    - match: {field_keywords: [medication, drug, code]}
      writable_paths: [candidate.args.resource.medicationCodeableConcept, candidate.args.resource.code, candidate.args.medication]
    - match: {field_keywords: [reason, indication]}
      writable_paths: [candidate.args.resource.reasonCode, candidate.args.reason]
  subject:
    type: patient
    binding: required        # every patient action must NAME its patient; "no target" != "active patient"
    id_context_keys: [patient_ref, patient_id, patient]      # structured context -> assigned subject
    # operated subject — supports nested FHIR create args (resource.subject.reference) via dotted paths.
    from_args: [patient, subject, subject_ref, patient_ref, patient_id, subject_id,
                resource.subject.reference, resource.patient.reference, subject.reference]
  actions:
    # resource-specific reads first (they tag the evidence resource); then generic read; then writes.
    - match: {tool_pattern: allergy}
      semantic_type: read
      effect: none
      resource: AllergyIntolerance
      produces_evidence: {source_class: record, modality: record}
    - match: {tool_pattern: medication_request_search}
      semantic_type: read
      effect: none
      resource: MedicationRequest
      produces_evidence: {source_class: record, modality: record}
    - match: {tool_pattern: _search}
      semantic_type: read
      effect: none
      produces_evidence: {source_class: record, modality: record}
    - match: {tool_pattern: _read}
      semantic_type: read
      effect: none
      produces_evidence: {source_class: record, modality: record}
    - match: {tool: get_lab_reference_range}                # reference-range lookup: NOT patient-bound
      semantic_type: read
      effect: none
      subject_binding: none
      produces_evidence: {source_class: record, modality: record}
    - match: {tool_pattern: medication_request_create}      # the high-risk commit (no evidence binding)
      semantic_type: create
      effect: irreversible
      resource: MedicationRequest
    - match: {tool_pattern: _create}
      semantic_type: create
      effect: irreversible
    - match: {tool: write_file}      # generic scratchpad write — NOT a patient operation
      semantic_type: update
      effect: reversible
      subject_binding: none
