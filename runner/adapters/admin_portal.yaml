# ENVIRONMENT ADAPTER — administrative web portal (GUI). The operated object is the DISPLAYED one (read
# from canonical_observation), not an action arg. Tool names live ONLY here.
name: admin_portal
substrate: interactive_gui
clinical_modules: []        # no extra clinical rules beyond the substrate submission invariant

manifest:
  # repair_targets (item 3): writable-path equivalences so the effect verifier resolves a finding the judge
  # mis-located. Paths target the harness state root {route, emr: full_state}. Field keywords match the
  # finding target/required_change. This is the portal schema (adapter layer), not gold.
  repair_targets:
    - match: {field_keywords: [disposition]}
      writable_paths: [emr.agentActions.selectedDisposition]
      verification: {type: any_path_nonempty}
    - match: {field_keywords: [note, document, reasoning, rationale, triage]}
      writable_paths: [emr.agentActions.addedAuthNote, emr.agentActions.addedProgressNote, emr.agentActions.documentedAppealInEpic]
      verification: {type: any_path_nonempty}
    - match: {field_keywords: [appeal, dispute, submit]}
      writable_paths: [emr.appealActions.submittedAppeal, emr.appealActions.submittedAttachmentNames]
      verification: {type: any_path_nonempty}
    - match: {field_keywords: [review, view, access, inspect, retrieve]}
      writable_paths: [emr.agentActions.viewedDenialDetails, emr.agentActions.viewedRemittanceImage, emr.agentActions.accessedPayerPortalForDenial, emr.agentActions.viewedAuthLetter]
      verification: {type: any_path_nonempty}
  subject:
    type: admin_case
    binding: implicit_active   # the operated case is the one DISPLAYED on the page (no per-action arg)
    from_goal_regex: '([A-Z]{2,5}-\d+)'                       # assigned case named in the task goal
    # DECLARED projection paths into the RAW environment observation (dotted paths supported). The harness
    # resolves the displayed case generically — NO portal field is hard-coded in the core. The full_state.*
    # paths target the GUI env's state digest; tune to the live observation without any code change.
    # TYPED projection: each entry yields an admin_case ref (regex extracts the id from a route). patient_id
    # is intentionally NOT here — it is a different subject TYPE and must not be read as the case id.
    from_observation:
      - {path: full_state.fields.caseId, type: admin_case}
      - {path: full_state.signals.caseId, type: admin_case}
      - {path: full_state.fields.case_id, type: admin_case}
      - {path: url, regex: '/(?:denied|denials|triage|cases)/([A-Za-z]{2,5}-\d+)', type: admin_case}
      - case_identity         # plain fallback (used by unit tests / envs that expose it directly)
  actions:
    - match: {tool_any: [navigate, click, select]}
      semantic_type: inspect
      effect: none
      produces_evidence: {source_class: interface, modality: administrative}
    - match: {tool_any: [snapshot, scroll, back, done, download]}   # read-only navigation / page re-read
      semantic_type: inspect
      effect: none
      produces_evidence: {source_class: interface, modality: administrative}
    - match: {tool_any: [type, upload]}
      semantic_type: update
      effect: reversible
    - match: {tool_any: [submit, send_appeal, change_case_status, upload_final_document]}
      semantic_type: submit
      effect: irreversible
