# ENVIRONMENT ADAPTER — administrative web portal (GUI). The operated object is the DISPLAYED one (read
# from canonical_observation), not an action arg. Tool names live ONLY here.
name: admin_portal
substrate: interactive_gui
clinical_modules: []        # no extra clinical rules beyond the substrate submission invariant

manifest:
  subject:
    type: admin_case
    binding: implicit_active   # the operated case is the one DISPLAYED on the page (no per-action arg)
    from_goal_regex: '([A-Z]{2,5}-\d+)'                       # assigned case named in the task goal
    # DECLARED projection paths into the RAW environment observation (dotted paths supported). The harness
    # resolves the displayed case generically — NO portal field is hard-coded in the core. The full_state.*
    # paths target the GUI env's state digest; tune to the live observation without any code change.
    from_observation: [case_identity, patient_id, subject_token,
                       full_state.signals.caseId, full_state.fields.caseId, full_state.fields.case_id,
                       full_state._page]
  actions:
    - match: {tool_any: [navigate, click, select]}
      semantic_type: inspect
      effect: none
      produces_evidence: {source_class: interface, modality: administrative}
    - match: {tool_any: [snapshot, scroll, back, done, download]}   # read-only navigation / page re-read
      semantic_type: inspect
      effect: none
      produces_evidence: {source_class: interface, modality: administrative}
    - match: {tool_any: [type, upload]}
      semantic_type: update
      effect: reversible
    - match: {tool_any: [submit, send_appeal, change_case_status, upload_final_document]}
      semantic_type: submit
      effect: irreversible
