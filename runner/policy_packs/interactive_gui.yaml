# SUBSTRATE: interactive GUI workflow (web / desktop portal). The operated-on object is the one DISPLAYED
# (read from canonical_observation), not an action arg. Tool names live ONLY in manifest.actions.

manifest:
  subject:
    type: admin_case
    from_goal_regex: '([A-Z]{2,5}-\d+)'                       # assigned case named in the task goal
    from_observation: [case_identity, patient_id, subject_token]   # operated case = the displayed one
  actions:
    - match: {tool_any: [navigate, click, select]}
      semantic_type: inspect
      effect: none
      produces_evidence: {source_class: interface, modality: administrative}
    - match: {tool_any: [type, upload]}
      semantic_type: update
      effect: reversible
    - match: {tool_any: [submit, send_appeal, change_case_status, upload_final_document]}
      semantic_type: submit
      effect: irreversible

evidence_obligations: []        # workflow-stage obligations need full_state signal mapping -> refinement
workflow_obligations: []

commit_points:
  - match: {semantic_type: submit}
    risk: R2
    requires: []
    postcondition: {type: case_status_not_draft}   # submit must change workflow state (state floor)
