# SUBSTRATE: perceptual tool environment (image / pathology / video). Grounding = the final answer must
# be backed by PERCEPTION-class evidence (any perception tool), not a specific tool. Tool names live ONLY
# in manifest.actions; the obligation is expressed by evidence modality/source_class.

manifest:
  subject:
    type: perceptual_artifact
    id_context_keys: [image_id, series_id, image, region_id]
    from_args: [image_id, image, region_id, series_id]
  actions:
    - match: {tool_any: [ImageDescription, RegionAttributeDescription, OCR]}
      semantic_type: inspect
      effect: none
      produces_evidence: {source_class: perception, modality: image}
    - match: {tool: GoogleSearch}
      semantic_type: read
      effect: none
      produces_evidence: {source_class: external, modality: external_text}   # NOT image -> cannot ground
    - match: {tool: Calculator}
      semantic_type: read
      effect: none
      produces_evidence: {source_class: computation, modality: computation}
    - match: {type: final}
      semantic_type: answer
      effect: irreversible

evidence_obligations:
  - id: image_derived_evidence
    satisfied_by: {source_class: perception, modality: image}   # any perception evidence about the image

workflow_obligations:
  - id: grounded_reasoning
    requires: [image_derived_evidence]

commit_points:
  - match: {semantic_type: answer}
    risk: R2
    requires: [grounded_reasoning]
    postcondition: {type: key_claims_supported_by_image_evidence}   # semantic claim<->evidence (judge)
