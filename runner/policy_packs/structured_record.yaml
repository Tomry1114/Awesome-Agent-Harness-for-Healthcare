# SUBSTRATE: structured record system (EHR / DB / resource API). PUBLIC, oracle-free.
#   manifest = the ADAPTER layer: maps raw tool names -> canonical semantics. This is the ONLY place tool
#              names appear. The harness core never sees them.
#   evidence/workflow obligations + commit points = the policy, expressed in CAPABILITY terms
#              (source_class / resource / semantic_type / effect) — no tool names.

manifest:
  subject:
    type: patient
    id_context_keys: [patient_ref, patient_id, patient]      # structured context -> assigned subject
    from_args: [patient, subject, subject_ref, patient_ref, patient_id, subject_id]   # operated subject
  actions:
    # resource-specific reads first (they tag the evidence resource); then generic read; then writes.
    - match: {tool_pattern: allergy}
      semantic_type: read
      effect: none
      resource: AllergyIntolerance
      produces_evidence: {source_class: record, modality: record}
    - match: {tool_pattern: medication_request_search}
      semantic_type: read
      effect: none
      resource: MedicationRequest
      produces_evidence: {source_class: record, modality: record}
    - match: {tool_pattern: _search}
      semantic_type: read
      effect: none
      produces_evidence: {source_class: record, modality: record}
    - match: {tool_pattern: _read}
      semantic_type: read
      effect: none
      produces_evidence: {source_class: record, modality: record}
    - match: {tool_pattern: medication_request_create}      # the high-risk commit (no evidence binding)
      semantic_type: create
      effect: irreversible
      resource: MedicationRequest
    - match: {tool_pattern: _create}
      semantic_type: create
      effect: irreversible
    - match: {tool: write_file}
      semantic_type: update
      effect: reversible

evidence_obligations:
  - id: check_allergies
    satisfied_by: {source_class: record, resource: AllergyIntolerance}
  - id: check_current_medications
    satisfied_by: {source_class: record, resource: MedicationRequest}

workflow_obligations:
  - id: medication_safety_review
    requires: [check_allergies, check_current_medications]

commit_points:
  - match: {semantic_type: create, resource: MedicationRequest}
    risk: R2
    requires: [medication_safety_review]
    requires_rule: medication_requires_safety_review
    postcondition: {type: state_transition}      # the created resource changed the record (read-back floor)
